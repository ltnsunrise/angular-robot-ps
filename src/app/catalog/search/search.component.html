<div class="container">
  <input class="search" placeholder="Search..." (keyup)="filter($event)" />
  <ul class="products">
    @for (product of products | async; track $index) {
      <li class="product-item">
        <bot-product-details [product]="product">
          <button class="cta" (click)="addToCart(product)">Buy</button>
        </bot-product-details>
      </li>
    }
  </ul>
</div>
